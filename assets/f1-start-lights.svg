<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" width="1000" height="280" role="img" aria-label="Loïs Clerc — cinq feux rouges s'allument, s'éteignent… c'est parti !">
  <title>Loïs Clerc — feux éteints, c'est parti !</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#080c1a"/>
      <stop offset="1" stop-color="#05060f"/>
    </linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset=".55" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#e10600"/>
    </linearGradient>
    <linearGradient id="lineg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="lampGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <pattern id="chk" width="28" height="28" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#94a3b8"/>
      <rect x="14" y="14" width="14" height="14" fill="#94a3b8"/>
    </pattern>
    <clipPath id="round"><rect x="3" y="3" width="994" height="274" rx="18"/></clipPath>
  </defs>

  <style>
    .mono { font-family: ui-monospace, "Cascadia Code", "SF Mono", Consolas, "Liberation Mono", monospace; }
    .sans { font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
    @keyframes ignite  { to { opacity: 1 } }
    @keyframes cut     { to { opacity: 0 } }
    @keyframes rise    { from { opacity: 0; transform: translateY(16px) } to { opacity: 1; transform: translateY(0) } }
    @keyframes slidein { from { opacity: 0; transform: translateX(-70px) } to { opacity: 1; transform: translateX(0) } }
    @keyframes zoom    { to { transform: translateX(1600px) } }
    @keyframes flash   { 0% { opacity: 0 } 12% { opacity: .8 } 100% { opacity: 0 } }
    @keyframes breathe { from { opacity: .16 } to { opacity: .45 } }

    .lamp     { opacity: .08 }
    .p1 .lamp { animation: ignite .16s ease-out  .55s forwards }
    .p2 .lamp { animation: ignite .16s ease-out 1.00s forwards }
    .p3 .lamp { animation: ignite .16s ease-out 1.45s forwards }
    .p4 .lamp { animation: ignite .16s ease-out 1.90s forwards }
    .p5 .lamp { animation: ignite .16s ease-out 2.35s forwards }
    .bulbs    { animation: cut .1s linear 3.35s forwards }
    .gantry   { animation: cut .6s ease 3.8s forwards }
    .label1   { animation: cut .35s ease 3.35s forwards }
    .title    { opacity: 0; animation: slidein .6s cubic-bezier(.16,1,.3,1) 3.75s forwards }
    .sub      { opacity: 0; animation: rise .55s ease 4.05s forwards }
    .glow     { opacity: 0; animation: breathe 2.8s ease-in-out 4.35s infinite alternate }
    .zoomline { animation: zoom 1s cubic-bezier(.25,.7,.25,1) forwards, flash 1s linear forwards }
    .z1 { animation-delay: 3.70s }
    .z2 { animation-delay: 3.85s }
    .z3 { animation-delay: 4.00s }
    @media (prefers-reduced-motion: reduce) {
      .gantry, .label1, .zoomline { display: none }
      .lamp, .bulbs { animation: none }
      .title, .sub { animation: none; opacity: 1; transform: none }
      .glow { animation: none; opacity: .3 }
    }
  </style>

  <rect x="3" y="3" width="994" height="274" rx="18" fill="url(#bg)" stroke="#1e293b" stroke-width="1.5"/>
  <g clip-path="url(#round)">
    <rect x="3" y="238" width="994" height="39" fill="url(#chk)" opacity=".07"/>
  </g>

  <text x="40" y="38" class="mono" font-size="12" letter-spacing="3" fill="#475569">GP DE GITHUB — TOUR 1/∞</text>
  <g class="mono" font-size="11" letter-spacing="1">
    <rect x="856" y="27" width="10" height="10" rx="2" fill="#a855f7"/><text x="871" y="36.5" fill="#64748b">S1</text>
    <rect x="900" y="27" width="10" height="10" rx="2" fill="#22c55e"/><text x="915" y="36.5" fill="#64748b">S2</text>
    <rect x="944" y="27" width="10" height="10" rx="2" fill="#eab308"/><text x="959" y="36.5" fill="#64748b">S3</text>
  </g>

  <text x="500" y="46" text-anchor="middle" class="mono label1" font-size="13" letter-spacing="5" fill="#94a3b8">DÉPART IMMINENT · CINQ FEUX ROUGES</text>

  <g class="gantry">
    <rect x="308" y="56" width="384" height="7" rx="3.5" fill="#1e293b"/>
    <g class="p1">
      <rect x="320" y="63" width="56" height="126" rx="12" fill="#0b1220" stroke="#1e293b"/>
      <circle cx="348" cy="103" r="17" fill="#2a0707"/>
      <circle cx="348" cy="155" r="17" fill="#2a0707"/>
      <g class="bulbs">
        <circle class="lamp" cx="348" cy="103" r="15.5" fill="#e10600" filter="url(#lampGlow)"/>
        <circle class="lamp" cx="348" cy="155" r="15.5" fill="#e10600" filter="url(#lampGlow)"/>
      </g>
    </g>
    <g class="p2">
      <rect x="396" y="63" width="56" height="126" rx="12" fill="#0b1220" stroke="#1e293b"/>
      <circle cx="424" cy="103" r="17" fill="#2a0707"/>
      <circle cx="424" cy="155" r="17" fill="#2a0707"/>
      <g class="bulbs">
        <circle class="lamp" cx="424" cy="103" r="15.5" fill="#e10600" filter="url(#lampGlow)"/>
        <circle class="lamp" cx="424" cy="155" r="15.5" fill="#e10600" filter="url(#lampGlow)"/>
      </g>
    </g>
    <g class="p3">
      <rect x="472" y="63" width="56" height="126" rx="12" fill="#0b1220" stroke="#1e293b"/>
      <circle cx="500" cy="103" r="17" fill="#2a0707"/>
      <circle cx="500" cy="155" r="17" fill="#2a0707"/>
      <g class="bulbs">
        <circle class="lamp" cx="500" cy="103" r="15.5" fill="#e10600" filter="url(#lampGlow)"/>
        <circle class="lamp" cx="500" cy="155" r="15.5" fill="#e10600" filter="url(#lampGlow)"/>
      </g>
    </g>
    <g class="p4">
      <rect x="548" y="63" width="56" height="126" rx="12" fill="#0b1220" stroke="#1e293b"/>
      <circle cx="576" cy="103" r="17" fill="#2a0707"/>
      <circle cx="576" cy="155" r="17" fill="#2a0707"/>
      <g class="bulbs">
        <circle class="lamp" cx="576" cy="103" r="15.5" fill="#e10600" filter="url(#lampGlow)"/>
        <circle class="lamp" cx="576" cy="155" r="15.5" fill="#e10600" filter="url(#lampGlow)"/>
      </g>
    </g>
    <g class="p5">
      <rect x="624" y="63" width="56" height="126" rx="12" fill="#0b1220" stroke="#1e293b"/>
      <circle cx="652" cy="103" r="17" fill="#2a0707"/>
      <circle cx="652" cy="155" r="17" fill="#2a0707"/>
      <g class="bulbs">
        <circle class="lamp" cx="652" cy="103" r="15.5" fill="#e10600" filter="url(#lampGlow)"/>
        <circle class="lamp" cx="652" cy="155" r="15.5" fill="#e10600" filter="url(#lampGlow)"/>
      </g>
    </g>
  </g>

  <g fill="url(#lineg)">
    <rect class="zoomline z1" x="-560" y="109.5" width="200" height="5" rx="2.5"/>
    <rect class="zoomline z2" x="-500" y="143.5" width="130" height="5" rx="2.5"/>
    <rect class="zoomline z3" x="-620" y="179.5" width="170" height="5" rx="2.5"/>
  </g>

  <text class="glow sans" x="500" y="152" text-anchor="middle" font-size="64" font-weight="800" font-style="italic" letter-spacing="3" fill="#7c3aed" filter="url(#soft)">LOÏS CLERC</text>
  <g class="title">
    <text x="500" y="152" text-anchor="middle" class="sans" font-size="64" font-weight="800" font-style="italic" letter-spacing="3" fill="url(#tg)">LOÏS CLERC</text>
  </g>
  <g class="sub">
    <text x="500" y="46" text-anchor="middle" class="mono" font-size="13" letter-spacing="5" fill="#e10600">FEUX ÉTEINTS — C'EST PARTI !</text>
    <text x="500" y="196" text-anchor="middle" class="sans" font-size="19" letter-spacing=".5" fill="#94a3b8">Développeur Full-Stack · Apprenti Ingénieur Data @ EZdrive · Étudiant Epitech</text>
    <text x="500" y="227" text-anchor="middle" class="sans" font-size="14" font-style="italic" fill="#64748b">« Je transforme des idées en code qui marche — vite, mais sans bug. »</text>
  </g>

  <text x="958" y="266" text-anchor="end" class="mono" font-size="10" fill="#334155">SVG animé fait main — zéro template</text>
</svg>
